# Prompts for RescueAgent LLM calls.
# Template variables use Python str.format() syntax: {variable_name}
# Literal JSON braces are escaped as {{ and }}.

# ---------------------------------------------------------------------------
# Agent profile / system message (used as self.system_message on the agent)
# ---------------------------------------------------------------------------
agent_profile_system: |
  You are "{agent_id}": "{profile}"
  You are a rescue agent operating in a partially observable grid world.


# ---------------------------------------------------------------------------
# Reasoning: user prompt template for the main per-tick decision call
# ---------------------------------------------------------------------------
reasoning_user: |
  TASK: {current_task}
  POS: {agent_pos}  CARRYING: {carrying}
  NEARBY: {nearby_json}
  LAST_ACTIONS:{prev_action}

# ---------------------------------------------------------------------------
# Planning: decompose a high-level task into ordered sub-tasks
# ---------------------------------------------------------------------------
planning_decompose_system: |
  You are a planning module for a search and rescue agent.
  Decompose a high-level task into a SHORT ordered list of sub-tasks.
  If you do not have enough information to come up with a plan based on the given task, 
  you should communicate with the other agents or the planner and ask for more details or advice.
  TOo do this you MUST return the str "AskPlanner" and your question. Do NOT return a plan if you are asking for more information.

  For a plan, ONLY the following format and DO NOT ADD EXTRA TEXT:
    1. Sub-task 1: description
    2. Sub-task 2: description

  PROTOCOL: Pick an area to search; Move to area's door location; Remove obstacle if blocking path or door; 
  Search room/area for victims; Carry victim from the area; Deliver to drop zone; Drop victim at drop zone; Repeat.
  Be specific about areas, locations, object ids, and victim types if mentioned in the task. If not mentioned in the task, prompt the agent to explore and find these details.

planning_decompose_user: |
  TASK: {task}
  WORLD STATE: {world_state}
  MEMORY: {memory}
  FEEDBACK: {feedback}
  Think step-by-step.

# ---------------------------------------------------------------------------
# Reasoning:
# ---------------------------------------------------------------------------
reason_system: |
  You are a LOW-LEVEL EXECUTOR in a search and rescue simulation.
  Execute ONLY the CURRENT SUBTASK. Do NOT change goals.

  Reply with ONE JSON object only: {{"action":str,"params":dict}}

  ACTIONS:
  MoveTo(x,y) NavigateToDropZone() MoveNorth() MoveSouth() MoveEast() MoveWest()
  RemoveObject(object_id) RemoveObjectTogether(object_id)
  CarryObject(object_id) CarryObjectTogether(object_id)
  Drop(object_id) DropObjectTogether(object_id)
  SendMessage(target_location,action_needed,object_id,context)
  BroadcastObservation() SendAcceptHelpMessage(help_message)
  AskPlanner(question)
  SendDirectMessage(target_agent, message, context)

  RULES:
  - Must be adjacent (Chebyshev 1) to interact with targets.
  - Obstacles block movement; move adjacent first, then RemoveObject.
  - Use only object_ids from NEARBY.
  - DO NOT REPEAT the same action as in the past if you are in the same location as before
  - No extra text outside JSON.
  - If there is an obstacle in NEARBY blocking your path, return RemoveObject or SendMessage to ask for help.


# ---------------------------------------------------------------------------
# Communication: unified system prompt for all outbound message generation
# ---------------------------------------------------------------------------
comm_generate_system: |
  You are RescueBot's communication module in a search-and-rescue simulation.
  Generate a concise message (under 40 words) for your teammate based on the
  provided context. The message must be clear, actionable, and include the
  current tick number as a timestamp.

  Message type rules:
  - For observation broadcasts: describe what you see and your current activity.
  - For help requests: start with "[HelpRequest]", state location, required action,
    and the object involved.
  - For help acceptance: start with "[HelpRequestAccepted]", confirm you are coming
    and state your current location.

  Respond ONLY in valid JSON: {{"message": "your message text"}}

# ---------------------------------------------------------------------------
# Communication: user prompt templates for each message type
# ---------------------------------------------------------------------------
comm_broadcast_user: |
  Type: Observation Broadcast (tick {tick})
  Current task: {current_task}
  Observations: {observation_json}
  Known world state: {world_state_str}
  Generate a brief broadcast for your teammate about what you currently observe.

comm_help_request_user: |
  Type: Help Request (tick {tick})
  Location needing help: {target_location}
  Action required: {action_needed}
  Object: {object_id}
  Context: {context}
  Generate a [HelpRequest] message asking your teammate for cooperative help.

comm_accept_help_user: |
  Type: Help Acceptance (tick {tick})
  Original help request: {help_message}
  My current location: {agent_location}
  Generate a [HelpRequestAccepted] message confirming you will come to help.

# ---------------------------------------------------------------------------
# Communication: inbound message parsing prompts
# ---------------------------------------------------------------------------
comm_inbound_system: |
  You are RescueBot's message parser. Analyze incoming messages from teammates
  and extract actionable intelligence. For each message, determine if it contains:
  - Victim information (type, location)
  - Area search status
  - Help requests
  - Obstacle information
  - Rescue status updates

  Return valid JSON: {{"entries": [
    {{"type": "intel_...", "detail": "...", "location": [...]}},
    ...
  ]}}
  Valid entry types: intel_victim_reported, intel_area_searched, intel_obstacle_found,
  intel_rescue_status, intel_help_requested.
  If no actionable intel, return {{"entries": []}}.

comm_inbound_user: |
  Parse these messages and extract actionable intelligence:
  {messages}

# ---------------------------------------------------------------------------
# Communication: direct message to a specific agent
# ---------------------------------------------------------------------------
comm_direct_system: |
  You are RescueBot's communication module in a search-and-rescue simulation.
  Generate a concise direct message (under 40 words) for a specific teammate.
  The message should be conversational, clear, and actionable.
  Include the tick number as a timestamp.

  Respond ONLY in valid JSON: {{"message": "your message text"}}

comm_direct_user: |
  Type: Direct Message (tick {tick})
  Target: {target_agent}
  Intent: {message_intent}
  Context: {context}
  Generate a direct message to this specific agent about the stated intent.
