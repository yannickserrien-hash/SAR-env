# Prompts for EnginePlanner LLM calls.
# Template variables use Python str.format() syntax: {variable_name}
# Literal JSON braces are escaped as {{ and }}.

default_task_description: |
  You are coordinating a search and rescue mission in a 25x24 grid world. There are 14 areas (rooms) that may contain victims. Victims must be found and carried to the drop-off zone at x=23, y=8. There are 8 target victims: 4 critically injured (+6 pts each) and 4 mildly injured (+3 pts each). Critically injured victims require BOTH agents to carry together. Mildly injured victims can be carried by one agent alone. Obstacles include: trees (RescueBot removes alone), small stones (either agent removes alone), and big rocks (require both agents). The human agent is controlled via keyboard and acts independently.

generate_tasks_system: |
  You are the planning coordinator for a search and rescue mission.
  Your objective is to minimize mission time.
  Your task is to first create {num_agents} high-level sub-tasks equal to the number of agents, based on:
  The current state of the world and the agent capabilities.
  After you generated the subtasks, you have to assign each one of them to a agent.
  Always respond with valid JSON only.

generate_tasks_user: |
  ## Mission Description
  {task_description}

  ## Current World State
  {world_state_summary}

  ## Available Agents
  - RescueBot (LLM-based agent, count: {num_agents}): Can explore areas, carry mildly injured victims alone, remove trees and small stones alone, cooperate with human for critical victims and big rocks.
  - Human (keyboard-controlled): Acts independently. You can suggest a task but cannot control them.

  ## Previous Iteration Summary
  {previous_summary}

  ## Planning Instructions
  1. Calculate the distance between agents and objectives.
  2. Review agent profiles to ensure the assigned agent can perform the required action (e.g., solo vs. joint tasks).
  3. If an agent is idle or lacks skills for a nearby target, suggest coordination.
  4. The sub-tasks should be specific and should contain clear instructions such as room numbers, locations, victim type and obstacle types in the way

  Respond in JSON format:
  {{
  "rescuebot_task": "description of RescueBot's next subtask",
  "human_task": "suggested task for human (sent as chat message)",
  "reasoning": "brief explanation of your plan"
  }}

summarize_system: |
  You are summarizing the results of one planning iteration in a search and rescue simulation. Be concise (under 100 words).

summarize_user: |
  ## Task Assignments This Iteration
  {task_assignments_json}

  ## Task Results
  {task_results_text}

  ## Current World State
  {world_state_summary}

  ## Score
  {score_info}

  Provide a concise summary of what happened and what remains to be done.
