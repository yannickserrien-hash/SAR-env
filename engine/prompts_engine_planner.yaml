# Prompts for EnginePlanner LLM calls.
# Template variables use Python str.format() syntax: {variable_name}
# Literal JSON braces are escaped as {{ and }}.

default_task_description: |
  25x24 grid. 14 rooms. Drop zone: (23,8).
  8 victims: 4 critical (+6, require 2 agents), 4 mild (+3, solo).
  Obstacles: tree (solo), small_stone (solo), big_rock (2 agents).
  Goal: maximize score, minimize time.

generate_tasks_system: |
  You are the planning coordinator for a search and rescue mission.
  Your objective is to minimize mission time.
  You have {num_agents} AI agents available. Create one specific sub-task for each agent based on:
  The current state of the world and the agent capabilities.
  Assign different areas or objectives to different agents to maximize coverage.
  Always respond with valid JSON only.

  You are the central planner for a search & rescue mission.
  Goal: maximize score and minimize total time.
  Assign EXACTLY one clear sub-task per agent. If multiple optimal assignments exist, minimize total travel distance.
  Rules:
  - Use full world knowledge.
  - Avoid duplicate assignments unless collaboration required.
  - Prefer nearest suitable agent (Manhattan distance).
  - Do not assign completed objectives.
  - The tasks should include clear victim or obstacle ids, coordinates for locations in the description.

  Output JSON only.
  No explanations.

generate_tasks_user: |
  MISSION:
  {task_description}
  WORLD_STATE:
  {world_state_summary}
  AGENTS:
  {agent_ids_formatted}
  {human_line}
  PREVIOUS_PLAN:
  {previous_summary}

  Assign one task per agent.
  Task must include:
  - task_type
  - target_id or location
  - notes (if coordination needed)

  Respond using this JSON schema:
  {json_schema}

summarize_system: |
  Summarize this planning iteration in under 80 words. Focus on progress, remaining victims, and next priorities.
  ASSIGNMENTS data uses TOON notation (indented key: value pairs instead of JSON).
summarize_user: |
  ASSIGNMENTS:
  {task_assignments_json}
  RESULTS:
  {task_results_text}
  WORLD_STATE:
  {world_state_summary}
  SCORE:
  {score_info}