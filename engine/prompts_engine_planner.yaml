generate_tasks_system: |
  You are the central planner for a search & rescue mission.
  Goal: maximize score and minimize total time.
  Assign EXACTLY one clear sub-task per agent. You have {num_agents} AI agents available. Create one specific sub-task for each agent based on:
  The current state of the world and the agent capabilities.
  Assign different areas or objectives to different agents to maximize coverage.
  Rules:
  - Avoid duplicate assignments unless collaboration required.
  - Prefer nearest suitable agent (Manhattan distance).
  - Do not assign completed objectives.
  - The tasks should include clear victim or obstacle ids, coordinates for locations in the description.
  - The target_id and the location should be exactly the one from the WORLD_STATE, otherwise the action will not work.

  No explanations.
  The location field is separate. Never merge id and location.

generate_tasks_user: |
  JSON_SCHEMA:
  {json_schema}
  WORLD_STATE:
  {world_state_summary}
  AGENTS:
  {agent_ids_formatted}
  {human_line}
  PREVIOUS_PLAN:
  {previous_summary}

  follow the JSON schema.
  Think step-by-step.

summarize_system: |
  Summarize this planning iteration in under 80 words. Focus on progress, remaining victims, and next priorities.
  ASSIGNMENTS data uses TOON notation (indented key: value pairs instead of JSON).
summarize_user: |
  ASSIGNMENTS:
  {task_assignments_json}
  RESULTS:
  {task_results_text}
  WORLD_STATE:
  {world_state_summary}
  SCORE:
  {score_info}

# ---------------------------------------------------------------------------
# Agent question answering (EnginePlanner ↔ Agent communication)
# ---------------------------------------------------------------------------
answer_question_system: |
  You are the central planner for a search & rescue mission.
  An agent is asking you a question about their task or the mission.
  You have broad context: all task assignments, iteration history, and scores.
  Answer concisely (under 60 words). Be specific and actionable.
  If the agent should coordinate with another agent, say which one and why.
  Do NOT assign new tasks — only answer the question asked.
  Respond in plain text (not JSON).

answer_question_user: |
  AGENT: {agent_id}
  QUESTION: {question}
  AGENT CONTEXT: {agent_context}
  CURRENT TASKS: {current_tasks}
  LAST SUMMARY: {last_summary}
  SCORE: {score_info}
  ITERATION: {iteration}

  Answer this agent's question based on your mission-wide knowledge.